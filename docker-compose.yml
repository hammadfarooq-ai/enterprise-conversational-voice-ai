version: "3.9"

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  orchestrator:
    build:
      context: ./services/orchestrator
    env_file: .env
    depends_on:
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"
    restart: unless-stopped

  media-gateway:
    build:
      context: ./services/media-gateway
    env_file: .env
    depends_on:
      - orchestrator
    ports:
      - "8010:8010"
      - "5004:5004/udp"
    restart: unless-stopped

  dialer-control:
    build:
      context: ./services/dialer-control
    env_file: .env
    depends_on:
      - orchestrator
    ports:
      - "8020:8020"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    depends_on:
      - dialer-control
    ports:
      - "3000:80"
    restart: unless-stopped
